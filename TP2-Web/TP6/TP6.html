<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu du Mémory</title>

<style>

html, body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #dcdcdc; 
}


header {
    background-color: #2c3e8f;
    color: white;
    padding: 20px;
    text-align: center;
}


.grille {
    display: flex;
    flex-wrap: wrap;
    width: 60%;
    margin: 40px auto;
    justify-content: center;
}


.carte {
    width: 18%;
    margin: 1%;
    background-color: #3498db;
    border: 3px solid #1f2f6f;
    border-radius: 10px;
    aspect-ratio: 1/1;
    cursor: pointer;
    overflow: hidden;
}


.carte img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.3s;
}


.carte:hover {
    background-color: #2980b9;
}


.carte:active img {
    opacity: 1;
}

</style>
</head>

<body>

<header>
    <h1>Jeu du Memory</h1>
</header>

<div class="grille">
    <div class="carte"><img src="Assets\Images\Image1.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image1.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image2.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image2.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image3.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image3.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image4.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image4.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image5.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image5.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image6.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image6.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image7.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image7.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image8.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image8.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image9.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image9.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image10.jpg"></div>
    <div class="carte"><img src="Assets\Images\Image10.jpg"></div>
</div>

</body>
</html>
