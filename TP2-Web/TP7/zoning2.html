<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoning 2</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
  font-size: 12px;
}

body {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.zone-haut {
  background-color: #f08080;
  border: 1px solid #c0392b;
  padding: 5px;
  width: 100%;
  height: 60px;
}

.conteneur {
  display: flex;
  flex: 1;
}

.zone-gauche {
  background-color: #87ceeb;
  border: 1px solid #2980b9;
  padding: 5px;
  width: 15%;
}

.zone-milieu {
  background-color: #90ee90;
  border: 1px solid #27ae60;
  padding: 5px;
  flex: 1;
}

.zone-droite {
  background-color: #d2a679;
  border: 1px solid #a0522d;
  padding: 5px;
  width: 15%;
}
</style>

</head>

<body>

<header class="zone-haut">Zone du Haut</header>

<div class="conteneur">
  <aside class="zone-gauche">Zone de Gauche</aside>
  <main class="zone-milieu">Zone du Milieu</main>
  <aside class="zone-droite">Zone de Droite</aside>
</div>

</body>
</html>
