<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoning 7</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
  font-size: 12px;
}

body {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.zone-haut {
  background-color: #d61010;
  border: 1px solid #2c3e8c;
  padding: 5px;
  text-align: center;
  height: 50px;
  color: white;
}

.conteneur {
  display: flex;
  flex: 1;
}

.zone-gauche {
  background-color: #87ceeb;
  border: 1px solid #2980b9;
  padding: 5px;
  width: 12%;
}

.colonnes {
  display: flex;
  flex: 1;
}

.col {
  background-color: #90ee90;
  border: 1px solid #27ae60;
  padding: 5px;
  flex: 1;
  text-align: center;
}

.zone-droite {
  background-color: #87ceeb;
  border: 1px solid #2980b9;
  padding: 5px;
  width: 12%;
}

.zone-bas {
  background-color: #f1c40f;
  border: 1px solid #d4ac0d;
  padding: 5px;
  text-align: center;
  height: 40px;
}
</style>

</head>
<body>

<header class="zone-haut">Zone du Haut</header>

<div class="conteneur">
  <aside class="zone-gauche">Zone de Gauche</aside>
  <div class="colonnes">
    <div class="col">Z1</div>
    <div class="col">Z2</div>
    <div class="col">Z3</div>
    <div class="col">Z4</div>
    <div class="col">Z5</div>
  </div>
  <aside class="zone-droite">Zone de Droite</aside>
</div>

<footer class="zone-bas">Zone du Bas</footer>

</body>
</html>
