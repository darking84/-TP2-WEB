<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoning 5</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
  font-size: 12px;
}

body {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.haut {
  background-color: #5bc8c8;
  border: 1px solid #17a589;
  padding: 5px;
  height: 40px;
}

.menu {
  background-color: #f0a500;
  border: 1px solid #d68910;
  padding: 5px;
  height: 30px;
}

.conteneur {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  flex: 1;
}

.zone-a {
  background-color: #5dade2;
  border: 1px solid #2980b9;
  padding: 5px;
}

.zone-b {
  background-color: #f0a500;
  border: 1px solid #d68910;
  padding: 5px;
}

.zone-c {
  background-color: #b2bec3;
  border: 1px solid #95a5a6;
  padding: 5px;
}

.zone-d {
  background-color: #5b6abf;
  border: 1px solid #2c3e8c;
  padding: 5px;
}

.bas {
  background-color: #f1c40f;
  border: 1px solid #d4ac0d;
  padding: 5px;
  height: 35px;
}
</style>

</head>
<body>

<header class="haut">Haut</header>
<nav class="menu">Menu</nav>

<div class="conteneur">
  <div class="zone-a">A</div>
  <div class="zone-b">B</div>
  <div class="zone-c">C</div>
  <div class="zone-d">D</div>
</div>

<footer class="bas">Bas</footer>

</body>
</html>
