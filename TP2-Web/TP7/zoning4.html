<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoning 4</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
  font-size: 12px;
}

body {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.haut {
  background-color: #5bc8c8;
  border: 1px solid #17a589;
  padding: 5px;
  height: 50px;
}

.menu {
  background-color: #c8549a;
  border: 1px solid #a93226;
  padding: 5px;
  height: 35px;
}

.milieu {
  background-color: #f1c40f;
  border: 1px solid #d4ac0d;
  padding: 5px;
  flex: 1;
}

.bas {
  background-color: #bdc3c7;
  border: 1px solid #95a5a6;
  padding: 5px;
  height: 35px;
}
</style>

</head>

<body>

<header class="haut">Haut</header>
<nav class="menu">Menu</nav>
<main class="milieu">Milieu</main>
<footer class="bas">Bas</footer>

</body>
</html>
